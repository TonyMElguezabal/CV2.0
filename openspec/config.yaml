schema: spec-driven

# Project context (optional)
# This is shown to AI when creating artifacts.
# Add your tech stack, conventions, style guides, domain knowledge, etc.
context: |
  Single source of truth: docs/base-standards.md. All standards derive from
  it; when other documents conflict, base-standards.md wins.

  Standards documents:
    - docs/base-standards.md (canonical, single source of truth)
    - docs/backend-standards.md
    - docs/frontend-standards.md
    - docs/documentation-standards.md

  Reference specifications:
    - docs/api-spec.yml (API contract)
    - docs/data-model.md (data model)

  Agent personas (adopt per task type):
    - Backend work: adopt ai-specs/agents/backend-developer.md
    - Frontend work: adopt ai-specs/agents/frontend-developer.md

  Workflow guidance: consult ai-specs/skills for reusable workflow skills;
  load and follow the relevant SKILL.md when a request matches a skill.

  All paths above are relative to the project root.


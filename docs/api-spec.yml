openapi: 3.0.0
info:
  title: CareerDNA API
  description: |
    CareerDNA's two API routes: the RAG-grounded chat endpoint and the
    first-party anonymized analytics event endpoint. See docs/PRD.md and
    docs/data-model.md for product/data context.
  version: 1.0.0
  license:
    name: UNLICENSED

servers:
  - url: http://localhost:3000
    description: Development server

paths:
  /api/chat:
    post:
      summary: Ask a grounded question about Jose's career
      description: >-
        Streams a retrieval-grounded answer via Server-Sent Events. Rate
        limited per-IP and best-effort per-session
        (lib/chat/rateLimit.ts). Never persists the question text server-side.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [question]
              properties:
                question:
                  type: string
                  minLength: 1
                  maxLength: 500
      responses:
        "200":
          description: >-
            text/event-stream of `token`, `citations`, `done` (or `error`)
            SSE events.
          content:
            text/event-stream:
              schema:
                type: string
        "400":
          description: Invalid JSON body or missing/empty/over-length question.
        "429":
          description: Rate limit exceeded; response body includes a contact fallback.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatErrorResponse"
        "503":
          description: >-
            The AI assistant is temporarily unavailable (upstream provider
            error or missing API key); response body includes a contact
            fallback.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatErrorResponse"

  /api/events:
    post:
      summary: Record an anonymized analytics event
      description: >-
        Public, Zod-validated, rate-limited write endpoint for first-party
        analytics (docs/data-model.md). Server-derives non-identifying
        dimensions from request headers and discards the raw IP/User-Agent/
        referrer path; sets occurredAt server-side. No PII is ever accepted
        or stored.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EventPayload"
      responses:
        "204":
          description: Event accepted and recorded.
        "400":
          description: >-
            Invalid JSON body or an event failing schema validation (unknown
            eventType, missing conditional field, out-of-range value).
        "429":
          description: Rate limit exceeded.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: rate_limited

components:
  schemas:
    ChatErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
        contact:
          type: object
          properties:
            email:
              type: string
            scheduling:
              type: string

    EventPayload:
      type: object
      required: [sessionId, eventType, pagePath]
      properties:
        sessionId:
          type: string
          description: >-
            Client-generated, in-memory per-tab random identifier
            (crypto.randomUUID()). Never derived from IP/UA/fingerprinting.
        eventType:
          type: string
          enum:
            - page_view
            - section_reach
            - chat_open
            - question_asked
            - resume_download
            - contact_click
        pagePath:
          type: string
          maxLength: 2048
        sectionId:
          type: string
          maxLength: 200
          description: Required when eventType is section_reach.
        scrollDepthPercent:
          type: integer
          minimum: 0
          maximum: 100
          description: Required when eventType is section_reach.
        contactTarget:
          type: string
          enum: [scheduling, email, linkedin]
          description: Required when eventType is contact_click.
